<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Card Game</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <h1>Memory Cards</h1>
    <div class="grid-container"></div>
    <p>Score: <span class="score"></span></p>
    <div class="actions">
      <button onclick="restart()">Restart</button>
      <br />
    </div>
    <div>
      <p class="manual-text">Click on the cards to look for the twins!</p>
      <p><span class="thank-you-message"></span></p>
    </div>
    <hr style="color: hsla(236, 85%, 65%, 0.35); margin: 60px 24px" />
    <p>
      <a class="see-code" href="https://github.com/RemiSlanina/memory-game"
        >Source Code
      </a>
    </p>
  </body>
</html>
